<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 1960" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-labelledby="ttl desc">
  <title id="ttl">PAI — Proactive AI Framework 架構圖</title>
  <desc id="desc">事件驅動的主動式 AI 框架：感知→決策→治理→行動→記憶，含 self-finetuning 三層與 .pai 容器，支援 Gemma 4 與 MiniCPM-o 4.5。</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#475569"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#15803d"/>
    </marker>
    <style>
      .lyr{font-size:21px;font-weight:700;}
      .ttl{font-size:15px;font-weight:700;}
      .sm{font-size:12.5px;}
      .xs{font-size:11px;fill:#475569;}
      .tag{font-size:11px;font-weight:700;}
      .e{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#arr);}
      .eg{stroke:#15803d;stroke-width:2;fill:none;marker-end:url(#arrG);}
      .ed{stroke:#94a3b8;stroke-width:1.6;fill:none;stroke-dasharray:5 4;marker-end:url(#arr);}
    </style>
  </defs>

  <rect width="1480" height="1960" fill="#f8fafc"/>
  <text x="40" y="46" font-size="30" font-weight="800" fill="#0f172a">PAI — Proactive AI Framework</text>
  <text x="40" y="72" font-size="15" fill="#475569">事件驅動 · 持續感知 · 受治理的主動行為 · 自我微調（主幹權重永不變更）· vito1317</text>

  <!-- ===================== 主管線（左欄） ===================== -->
  <!-- ① 感知層 -->
  <rect x="40" y="96" width="840" height="150" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="60" y="124" class="lyr" fill="#b45309">① 感知層 · Triggers</text>
  <g>
    <rect x="60" y="138" width="148" height="92" rx="8" fill="#fff" stroke="#fbbf24"/>
    <text x="72" y="162" class="ttl">IntervalTrigger</text><text x="72" y="182" class="xs">心跳 / 輪詢</text>
    <rect x="220" y="138" width="148" height="92" rx="8" fill="#fff" stroke="#fbbf24"/>
    <text x="232" y="162" class="ttl">ScheduleTrigger</text><text x="232" y="182" class="xs">每日定時 HH:MM</text>
    <rect x="380" y="138" width="148" height="92" rx="8" fill="#fff" stroke="#fbbf24"/>
    <text x="392" y="162" class="ttl">FileWatch</text><text x="392" y="182" class="xs">檔案/目錄變動</text>
    <rect x="540" y="138" width="148" height="92" rx="8" fill="#fff" stroke="#fbbf24"/>
    <text x="552" y="162" class="ttl">Threshold</text><text x="552" y="182" class="xs">指標越界(遲滯)</text>
    <rect x="700" y="138" width="162" height="92" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="712" y="162" class="ttl">DuplexOmniLoop</text><text x="712" y="182" class="xs">全雙工持續感知</text><text x="712" y="200" class="xs">看+聽串流</text>
  </g>

  <!-- Event pill -->
  <rect x="300" y="262" width="320" height="40" rx="20" fill="#fde68a" stroke="#b45309"/>
  <text x="460" y="288" text-anchor="middle" class="ttl">Event · source / kind / payload / ts</text>
  <path class="e" d="M460 246 V262"/>

  <!-- ② 決策層 -->
  <rect x="40" y="320" width="840" height="232" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="60" y="348" class="lyr" fill="#4338ca">② 決策層 · Brain（模型無關，可插拔）</text>
  <rect x="60" y="362" width="220" height="170" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="72" y="386" class="ttl">RuleBrain</text>
  <text x="72" y="406" class="xs">純規則 · 離線 · 零成本</text>
  <text x="72" y="424" class="xs">前線哨兵 + 安全 fallback</text>
  <text x="72" y="452" class="xs">宣告式 when→intent</text>

  <rect x="296" y="362" width="566" height="170" rx="8" fill="#fff" stroke="#818cf8"/>
  <text x="308" y="384" class="ttl" fill="#4338ca">LLM 決策腦（失敗自動退回 RuleBrain）</text>
  <rect x="308" y="396" width="128" height="124" rx="6" fill="#f5f3ff" stroke="#a5b4fc"/>
  <text x="320" y="418" class="sm" font-weight="700">LLMBrain</text><text x="320" y="436" class="xs">雲端 API</text>
  <rect x="444" y="396" width="128" height="124" rx="6" fill="#f5f3ff" stroke="#a5b4fc"/>
  <text x="456" y="418" class="sm" font-weight="700">LocalLLMBrain</text><text x="456" y="436" class="xs">llama-cpp-python</text>
  <rect x="580" y="396" width="128" height="124" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="592" y="418" class="sm" font-weight="700">LlamaServer</text><text x="592" y="436" class="xs">llama.cpp server</text><text x="592" y="470" class="tag" fill="#1d4ed8">Gemma 4</text><text x="592" y="486" class="xs">26B-A4B</text>
  <rect x="716" y="396" width="134" height="124" rx="6" fill="#dcfce7" stroke="#16a34a"/>
  <text x="728" y="418" class="sm" font-weight="700">MiniCPMo</text><text x="728" y="436" class="xs">transformers/server</text><text x="728" y="470" class="tag" fill="#15803d">MiniCPM-o 4.5</text><text x="728" y="486" class="xs">omni 全雙工</text>
  <path class="e" d="M460 302 V320"/>

  <!-- Intent pill -->
  <rect x="280" y="566" width="360" height="40" rx="20" fill="#c7d2fe" stroke="#4338ca"/>
  <text x="460" y="592" text-anchor="middle" class="ttl">Intent · action/conf/urgency/rationale/level</text>
  <path class="e" d="M460 552 V566"/>

  <!-- ③ 治理層 -->
  <rect x="40" y="624" width="840" height="150" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="60" y="652" class="lyr" fill="#b91c1c">③ 治理層 · ProactivityPolicy</text>
  <g class="sm">
    <rect x="60" y="666" width="124" height="92" rx="8" fill="#fff" stroke="#fca5a5"/><text x="72" y="692" class="sm" font-weight="700">1 信心門檻</text><text x="72" y="712" class="xs">低信心→OBSERVE</text>
    <rect x="196" y="666" width="124" height="92" rx="8" fill="#fff" stroke="#fca5a5"/><text x="208" y="692" class="sm" font-weight="700">2 風險上限</text><text x="208" y="712" class="xs">每動作最高等級</text>
    <rect x="332" y="666" width="124" height="92" rx="8" fill="#fff" stroke="#fca5a5"/><text x="344" y="692" class="sm" font-weight="700">3 回饋降級</text><text x="344" y="712" class="xs">常被拒→更保守</text>
    <rect x="468" y="666" width="124" height="92" rx="8" fill="#fff" stroke="#fca5a5"/><text x="480" y="692" class="sm" font-weight="700">4 安靜時段</text><text x="480" y="712" class="xs">夜間不打擾</text>
    <rect x="604" y="666" width="138" height="92" rx="8" fill="#fee2e2" stroke="#ef4444"/><text x="616" y="688" class="sm" font-weight="700">5 干擾度公式</text><text x="616" y="706" class="xs">urgency×conf</text><text x="616" y="722" class="xs">&gt; cost 才打擾</text>
    <rect x="754" y="666" width="114" height="92" rx="8" fill="#fff" stroke="#fca5a5"/><text x="766" y="692" class="sm" font-weight="700">6 頻率上限</text><text x="766" y="712" class="xs">每小時打擾數</text>
  </g>
  <path class="e" d="M460 606 V624"/>

  <!-- ④ 行動層 -->
  <rect x="40" y="792" width="840" height="132" rx="12" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
  <text x="60" y="820" class="lyr" fill="#0e7490">④ 行動層 · Actions（自主等級）</text>
  <rect x="60" y="834" width="190" height="74" rx="8" fill="#fff" stroke="#67e8f9"/><text x="72" y="860" class="ttl">OBSERVE</text><text x="72" y="884" class="xs">只記錄，不打擾</text>
  <rect x="262" y="834" width="190" height="74" rx="8" fill="#fff" stroke="#67e8f9"/><text x="274" y="860" class="ttl">SUGGEST</text><text x="274" y="884" class="xs">通知 / 微光提示</text>
  <rect x="464" y="834" width="190" height="74" rx="8" fill="#fff" stroke="#67e8f9"/><text x="476" y="860" class="ttl">ASK</text><text x="476" y="884" class="xs">草稿 + 人類確認</text>
  <rect x="666" y="834" width="196" height="74" rx="8" fill="#cffafe" stroke="#06b6d4"/><text x="678" y="860" class="ttl">ACT</text><text x="678" y="884" class="xs">高信心低風險自動執行</text>
  <path class="e" d="M460 774 V792"/>

  <!-- ⑤ 記憶層 -->
  <rect x="40" y="944" width="840" height="150" rx="12" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="60" y="972" class="lyr" fill="#334155">⑤ 記憶層 · Memory (SQLite)</text>
  <g>
    <rect x="60" y="986" width="120" height="90" rx="8" fill="#fff" stroke="#cbd5e1"/><text x="72" y="1012" class="sm" font-weight="700">events</text>
    <rect x="192" y="986" width="120" height="90" rx="8" fill="#fff" stroke="#cbd5e1"/><text x="204" y="1012" class="sm" font-weight="700">intents</text>
    <rect x="324" y="986" width="120" height="90" rx="8" fill="#fff" stroke="#cbd5e1"/><text x="336" y="1012" class="sm" font-weight="700">outcomes</text>
    <rect x="456" y="986" width="132" height="90" rx="8" fill="#fff" stroke="#cbd5e1"/><text x="468" y="1012" class="sm" font-weight="700">feedback</text><text x="468" y="1032" class="xs">核准/駁回/</text><text x="468" y="1048" class="xs">修改/忽略</text>
    <rect x="600" y="986" width="130" height="90" rx="8" fill="#fff" stroke="#cbd5e1"/><text x="612" y="1012" class="sm" font-weight="700">protocol</text><text x="612" y="1032" class="xs">PAI Protocol</text><text x="612" y="1048" class="xs">v1.1 紀錄</text>
    <rect x="742" y="986" width="126" height="90" rx="8" fill="#e2e8f0" stroke="#64748b"/><text x="754" y="1012" class="sm" font-weight="700">experiences</text><text x="754" y="1032" class="xs">向量化經驗</text>
  </g>
  <path class="e" d="M460 924 V944"/>

  <!-- 記憶回灌決策 -->
  <path class="ed" d="M40 1019 H22 V470 H40" />
  <text x="-470" y="18" transform="rotate(-90)" class="xs" fill="#64748b">記憶上下文 + 回饋教訓注入決策</text>

  <!-- ===================== Self-Finetuning（右欄） ===================== -->
  <rect x="912" y="96" width="528" height="998" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5"/>
  <text x="934" y="128" class="lyr" fill="#15803d">Self-Finetuning（1+2+3）</text>
  <text x="934" y="150" class="xs">主幹權重 weights.gguf 永不變更 · 兩個模型皆適用</text>

  <rect x="934" y="166" width="484" height="92" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="946" y="190" class="ttl" fill="#15803d">第 1 層 · 記憶式即時學習</text>
  <text x="946" y="212" class="sm">ReflectiveMemory：回饋→經驗向量</text>
  <text x="946" y="232" class="sm">相似情境檢索教訓→注入決策（毫秒級，零風險）</text>

  <rect x="934" y="272" width="484" height="64" rx="8" fill="#fff" stroke="#86efac"/>
  <text x="946" y="297" class="ttl">export_preference_dataset</text>
  <text x="946" y="320" class="xs">accepted=正例 / rejected=負例 · run_periodic 定期觸發</text>

  <rect x="934" y="350" width="484" height="92" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="946" y="374" class="ttl" fill="#15803d">第 2 層 · LoRA 訓練後端</text>
  <text x="946" y="396" class="sm">LlamaFinetuneBackend（GGUF LoRA, Gemma/MiniCPM-o-gguf）</text>
  <text x="946" y="416" class="sm">LlamaFactoryBackend（PEFT LoRA, MiniCPM-o transformers）</text>
  <text x="946" y="434" class="xs">輸出小 adapter（數十 MB），主幹不動</text>

  <rect x="1086" y="456" width="180" height="40" rx="20" fill="#bbf7d0" stroke="#15803d"/>
  <text x="1176" y="481" text-anchor="middle" class="ttl">候選 adapter</text>
  <path class="eg" d="M1176 442 V456"/>

  <!-- EvalGate diamond -->
  <polygon points="1176,512 1316,567 1176,622 1036,567" fill="#fff" stroke="#16a34a" stroke-width="2"/>
  <text x="1176" y="555" text-anchor="middle" class="ttl" fill="#15803d">第 3 層 EvalGate</text>
  <text x="1176" y="576" text-anchor="middle" class="xs">增益≥門檻 且 無退化？</text>
  <path class="eg" d="M1176 496 V512"/>

  <rect x="934" y="648" width="232" height="96" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="946" y="672" class="ttl" fill="#15803d">AdapterStore</text>
  <text x="946" y="694" class="xs">active 指標 / 歷史</text>
  <text x="946" y="712" class="xs">一鍵回滾 rollback</text>
  <text x="946" y="732" class="xs">→ 稽核 audit.jsonl</text>
  <path class="eg" d="M1120 612 L1080 648"/>
  <text x="1090" y="636" class="tag" fill="#15803d">通過</text>

  <rect x="1186" y="648" width="232" height="96" rx="8" fill="#bbf7d0" stroke="#15803d"/>
  <text x="1198" y="672" class="ttl" fill="#15803d">執行期熱切換</text>
  <text x="1198" y="694" class="sm">/lora-adapters（server）</text>
  <text x="1198" y="714" class="sm">set_adapter（PEFT）</text>
  <text x="1198" y="734" class="xs">不重載 14.4GB 主幹</text>
  <path class="eg" d="M1166 696 H1186"/>

  <!-- reject path -->
  <path class="eg" d="M1316 567 H1392 V648" />
  <text x="1330" y="560" class="tag" fill="#b91c1c">未通過→丟棄</text>

  <rect x="934" y="762" width="484" height="60" rx="8" fill="#fff" stroke="#86efac"/>
  <text x="946" y="786" class="ttl">run_periodic（定期排程）</text>
  <text x="946" y="808" class="xs">每日/每週：匯出→訓練→閘門→上線，全自動</text>
  <path class="ed" d="M1176 822 V840 H700 V836" stroke="#15803d"/>

  <rect x="934" y="838" width="484" height="120" rx="8" fill="#ffffff" fill-opacity="0.5" stroke="#86efac" stroke-dasharray="5 4"/>
  <text x="946" y="862" class="ttl" fill="#15803d">兩個模型對等</text>
  <text x="946" y="886" class="sm">• Gemma 4：LlamaServerBrain + GGUF LoRA + /lora-adapters</text>
  <text x="946" y="908" class="sm">• MiniCPM-o：transformers→PEFT，或 GGUF→/lora-adapters</text>
  <text x="946" y="930" class="sm">• attach_self_finetuning(agent) 一行自動接好對應後端</text>
  <text x="946" y="950" class="xs">EvalGate / 回滾 / 稽核 為共用層</text>

  <!-- feedback → layer1 -->
  <path class="eg" d="M868 1031 H900 V212 H934" />
  <text x="876" y="1024" class="xs" fill="#15803d">feedback/experiences →</text>
  <!-- hot-swap back to brain -->
  <path class="ed" d="M1302 648 V440 H700 V440" stroke="#15803d"/>
  <text x="980" y="436" class="xs" fill="#15803d">新 adapter 掛回決策腦（Gemma / MiniCPM-o）↩</text>

  <!-- ===================== .pai 容器（底部） ===================== -->
  <rect x="40" y="1124" width="1400" height="240" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="64" y="1156" class="lyr" fill="#1d4ed8">.pai 二進位容器格式（類 GGUF · 單檔可發布）</text>
  <text x="64" y="1178" class="xs">Header(magic PAI\x01) → Section Table(每段 SHA-256 校驗, 64-byte 對齊) → Data Area(權重 mmap)</text>
  <g>
    <rect x="64" y="1196" width="250" height="148" rx="8" fill="#fff" stroke="#93c5fd"/>
    <text x="78" y="1220" class="ttl">設定段 (JSON, zlib)</text>
    <text x="78" y="1244" class="sm">manifest · policy</text>
    <text x="78" y="1264" class="sm">triggers · rules</text>
    <text x="78" y="1284" class="sm">actions · brain</text>
    <text x="78" y="1314" class="xs">load_runtime 實例化整個 agent</text>

    <rect x="330" y="1196" width="250" height="148" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="344" y="1220" class="ttl">weights.gguf</text>
    <text x="344" y="1244" class="sm">主幹權重</text>
    <text x="344" y="1264" class="xs">mmap, 不壓縮</text>
    <text x="344" y="1290" class="xs">Gemma 4 / MiniCPM-o</text>

    <rect x="596" y="1196" width="270" height="148" rx="8" fill="#fff" stroke="#93c5fd"/>
    <text x="610" y="1220" class="ttl">omni 多模態元件</text>
    <text x="610" y="1244" class="sm">weights/vision · audio</text>
    <text x="610" y="1264" class="sm">tts · token2wav/*</text>
    <text x="610" y="1290" class="xs">全雙工：影音入、文字+語音出</text>

    <rect x="882" y="1196" width="270" height="148" rx="8" fill="#fff" stroke="#93c5fd"/>
    <text x="896" y="1220" class="ttl">adapters/active.gguf</text>
    <text x="896" y="1244" class="sm">學習成果（可選）</text>
    <text x="896" y="1264" class="xs">bake_adapter_into_pai</text>
    <text x="896" y="1290" class="xs">把學過的 agent 整包發布</text>

    <rect x="1168" y="1196" width="252" height="148" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="1182" y="1220" class="ttl">完整性</text>
    <text x="1182" y="1244" class="sm">每段 SHA-256</text>
    <text x="1182" y="1264" class="xs">防損毀/竄改</text>
    <text x="1182" y="1290" class="xs">PaiReader 開檔零拷貝(mmap)</text>
  </g>

  <!-- 發佈 footer -->
  <rect x="40" y="1392" width="1400" height="80" rx="12" fill="#0f172a"/>
  <text x="64" y="1426" font-size="16" font-weight="700" fill="#fff">發佈</text>
  <text x="64" y="1452" font-size="13" fill="#cbd5e1">PyPI: pip install paigent　·　GitHub: github.com/vito1317/pai-framework　·　HF: vito95311/gemma-guardian-pai · vito95311/minicpm-o-guardian-pai</text>

  <!-- legend -->
  <text x="40" y="1520" font-size="13" font-weight="700" fill="#334155">圖例</text>
  <rect x="100" y="1508" width="16" height="16" rx="3" fill="#fffbeb" stroke="#f59e0b"/><text x="122" y="1521" class="sm">感知</text>
  <rect x="180" y="1508" width="16" height="16" rx="3" fill="#eef2ff" stroke="#6366f1"/><text x="202" y="1521" class="sm">決策</text>
  <rect x="260" y="1508" width="16" height="16" rx="3" fill="#fef2f2" stroke="#ef4444"/><text x="282" y="1521" class="sm">治理</text>
  <rect x="340" y="1508" width="16" height="16" rx="3" fill="#ecfeff" stroke="#06b6d4"/><text x="362" y="1521" class="sm">行動</text>
  <rect x="420" y="1508" width="16" height="16" rx="3" fill="#f1f5f9" stroke="#64748b"/><text x="442" y="1521" class="sm">記憶</text>
  <rect x="500" y="1508" width="16" height="16" rx="3" fill="#f0fdf4" stroke="#16a34a"/><text x="522" y="1521" class="sm">自我微調</text>
  <rect x="600" y="1508" width="16" height="16" rx="3" fill="#eff6ff" stroke="#2563eb"/><text x="622" y="1521" class="sm">.pai 容器</text>
</svg>
